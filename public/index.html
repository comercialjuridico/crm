<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhatsApp CRM</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #22263a; --border: #2e3347;
      --accent: #25d366; --accent2: #128c7e; --text: #e8eaf0; --text2: #8b91a8;
      --danger: #ef4444; --warn: #f59e0b; --radius: 10px;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

    /* Sidebar */
    #sidebar { width: 340px; min-width: 280px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    #sidebar-header { padding: 14px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    #sidebar-header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    #sidebar-header h1 { font-size: 17px; font-weight: 700; color: var(--accent); }
    #user-info { font-size: 11px; color: var(--text2); }
    #btn-logout { background: transparent; border: 1px solid var(--border); color: var(--text2); padding: 3px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
    #btn-logout:hover { border-color: var(--danger); color: var(--danger); }
    #search-input { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; }
    #search-input:focus { outline: none; border-color: var(--accent); }
    #filter-bar { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .filter-btn { padding: 3px 9px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; transition: all .15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
    #chat-list { flex: 1; overflow-y: auto; }
    #chat-list::-webkit-scrollbar { width: 4px; }
    #chat-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .chat-item { padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; gap: 10px; transition: background .12s; }
    .chat-item:hover { background: var(--surface2); }
    .chat-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
    .chat-item.unhandled { border-left: 3px solid var(--warn); }
    .chat-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
    .chat-info { flex: 1; min-width: 0; }
    .chat-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .chat-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; flex-shrink: 0; }
    .chat-time { font-size: 10px; color: var(--text2); }
    .badge-unhandled { background: var(--warn); color: #000; font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 8px; text-transform: uppercase; }
    .label-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
    .label-chip { font-size: 9px; padding: 1px 5px; border-radius: 6px; color: #fff; font-weight: 600; }

    /* Main */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    #qr-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; }
    #qr-screen h2 { font-size: 20px; color: var(--accent); }
    #qr-screen p { color: var(--text2); text-align: center; max-width: 300px; line-height: 1.5; font-size: 13px; }
    #qr-img { border-radius: 10px; background: #fff; padding: 10px; max-width: 220px; }

    /* Chat Header */
    #chat-header { padding: 12px 18px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
    #chat-header-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; }
    #chat-header-info { flex: 1; }
    #chat-header-name { font-weight: 700; font-size: 15px; }
    #chat-header-sub { font-size: 11px; color: var(--text2); margin-top: 1px; }
    #chat-header-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 5px 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; transition: all .15s; display: flex; align-items: center; gap: 5px; }
    .action-btn:hover { border-color: var(--accent); color: var(--accent); }
    .action-btn.warn-btn { border-color: var(--warn); color: var(--warn); }
    .action-btn.warn-btn:hover { background: var(--warn); color: #000; }
    .action-btn.archive-btn { border-color: var(--text2); color: var(--text2); }
    .action-btn.archive-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Labels panel */
    #labels-panel { padding: 7px 18px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; min-height: 36px; }
    #labels-panel-title { font-size: 11px; color: var(--text2); }
    .label-tag { display: flex; align-items: center; gap: 3px; font-size: 11px; padding: 2px 7px; border-radius: 10px; color: #fff; font-weight: 600; cursor: pointer; }
    .label-tag .remove-label { font-size: 13px; line-height: 1; opacity: .7; }
    .label-tag .remove-label:hover { opacity: 1; }
    .add-label-btn { padding: 2px 8px; border-radius: 10px; border: 1px dashed var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; }
    .add-label-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* Messages */
    #messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 6px; }
    #messages-container::-webkit-scrollbar { width: 4px; }
    #messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    .msg-row { display: flex; }
    .msg-row.from-me { justify-content: flex-end; }
    .msg-bubble { max-width: 65%; padding: 7px 11px; border-radius: 12px; font-size: 13px; line-height: 1.5; }
    .msg-row.from-them .msg-bubble { background: var(--surface2); border-radius: 2px 12px 12px 12px; }
    .msg-row.from-me .msg-bubble { background: var(--accent2); border-radius: 12px 12px 2px 12px; }
    .msg-author { font-size: 10px; color: var(--accent); font-weight: 700; margin-bottom: 2px; }
    .msg-time { font-size: 10px; color: var(--text2); margin-top: 3px; text-align: right; }
    .msg-media-icon { font-size: 20px; margin-bottom: 3px; }
    .msg-transcription { margin-top: 6px; padding: 6px 8px; background: rgba(255,255,255,.06); border-radius: 6px; font-size: 12px; color: var(--text2); font-style: italic; }
    .msg-summary { margin-top: 4px; padding: 5px 8px; background: rgba(37,211,102,.1); border-radius: 6px; font-size: 11px; color: var(--accent); }
    .msg-file-link { display: flex; align-items: center; gap: 6px; margin-top: 4px; font-size: 12px; color: var(--accent); text-decoration: none; }

    /* Input area */
    #message-input-area { padding: 12px 16px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: flex-end; gap: 8px; }
    #msg-input { flex: 1; padding: 9px 14px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--text); font-size: 14px; resize: none; max-height: 120px; font-family: inherit; }
    #msg-input:focus { outline: none; border-color: var(--accent); }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: var(--accent); border: none; color: #000; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .send-btn:hover { opacity: .85; }
    .attach-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .attach-btn:hover { border-color: var(--accent); color: var(--accent); }
    .attach-btn.recording { background: var(--danger); border-color: var(--danger); color: #fff; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .5; } }

    /* No chat */
    #no-chat-selected { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text2); gap: 10px; }

    /* Dropdown */
    .dropdown { position: fixed; z-index: 100; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 4px; min-width: 160px; box-shadow: 0 8px 24px rgba(0,0,0,.4); }
    .dropdown-item { padding: 7px 12px; cursor: pointer; border-radius: 6px; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: background .1s; }
    .dropdown-item:hover { background: var(--border); }
    .dropdown-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; width: 360px; max-width: 95vw; }
    .modal h3 { font-size: 15px; margin-bottom: 14px; }
    .modal-label-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--border); }
    .modal-label-color { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
    .modal-label-name { flex: 1; font-size: 13px; }
    .modal-del-btn { background: transparent; border: 1px solid var(--border); color: var(--danger); padding: 2px 7px; border-radius: 5px; font-size: 11px; cursor: pointer; }
    .modal-del-btn:hover { background: var(--danger); color: #fff; }
    .modal-add-row { display: flex; gap: 6px; margin-top: 12px; }
    .modal-input { flex: 1; padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 13px; }
    .modal-input:focus { outline: none; border-color: var(--accent); }
    .color-pick { width: 36px; height: 34px; padding: 2px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); cursor: pointer; }
    .modal-save-btn { padding: 7px 12px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 13px; }
    .modal-close-btn { margin-top: 12px; width: 100%; padding: 7px; background: transparent; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; font-size: 13px; }
    .modal-close-btn:hover { color: var(--text); }

    /* Status */
    #status-bar { position: fixed; bottom: 14px; right: 18px; display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--danger); }
    .status-dot.connected { background: var(--accent); }
    .empty-msg { text-align: center; color: var(--text2); padding: 40px 20px; font-size: 13px; }

    /* Upload progress */
    #upload-progress { display: none; font-size: 12px; color: var(--accent); padding: 4px 0; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-header-top">
      <h1>💬 WhatsApp CRM</h1>
      <div style="display:flex;align-items:center;gap:6px">
        <span id="user-info"></span>
        <button id="btn-logout">Sair</button>
      </div>
    </div>
    <input id="search-input" type="text" placeholder="Buscar conversa..." />
    <div id="filter-bar">
      <button class="filter-btn active" data-filter="all">Todos</button>
      <button class="filter-btn" data-filter="group">Grupos</button>
      <button class="filter-btn" data-filter="direct">Diretos</button>
      <button class="filter-btn" data-filter="unhandled">Pendentes</button>
      <button class="filter-btn" data-filter="archived">Arquivados</button>
    </div>
  </div>
  <div id="chat-list"></div>
</div>

<div id="main">
  <div id="qr-screen">
    <h2>Conectar WhatsApp</h2>
    <p>Aguardando QR code...</p>
    <div id="qr-spinner" style="color:var(--text2);font-size:13px">Iniciando...</div>
    <img id="qr-img" style="display:none" alt="QR Code" />
  </div>

  <div id="chat-view" style="display:none; flex:1; flex-direction:column;">
    <div id="chat-header">
      <div id="chat-header-avatar">👤</div>
      <div id="chat-header-info">
        <div id="chat-header-name">—</div>
        <div id="chat-header-sub"></div>
      </div>
      <div id="chat-header-actions">
        <button class="action-btn warn-btn" id="btn-unhandled">⚑ Pendente</button>
        <button class="action-btn archive-btn" id="btn-archive">📁 Arquivar</button>
        <button class="action-btn" id="btn-labels-panel">🏷 Etiquetas</button>
        <button class="action-btn" id="btn-manage-labels">⚙</button>
      </div>
    </div>

    <div id="labels-panel">
      <span id="labels-panel-title">Etiquetas:</span>
      <div id="active-labels"></div>
      <button class="add-label-btn" id="btn-add-label">+ Adicionar</button>
    </div>

    <div id="messages-container"></div>

    <div id="message-input-area">
      <button class="attach-btn" id="btn-attach" title="Anexar arquivo">📎</button>
      <button class="attach-btn" id="btn-audio" title="Gravar áudio">🎤</button>
      <input type="file" id="file-input" style="display:none" />
      <div style="flex:1;display:flex;flex-direction:column;gap:4px">
        <div id="upload-progress">Enviando...</div>
        <textarea id="msg-input" placeholder="Digite uma mensagem..." rows="1"></textarea>
      </div>
      <button class="send-btn" id="btn-send">➤</button>
    </div>
  </div>

  <div id="no-chat-selected">
    <div style="font-size:48px;opacity:.2">💬</div>
    <p style="font-size:14px">Selecione uma conversa</p>
  </div>
</div>

<div id="status-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">Desconectado</span>
</div>

<div id="label-dropdown" class="dropdown" style="display:none"></div>
<div id="modal-manage" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Gerenciar Etiquetas</h3>
    <div id="modal-label-list"></div>
    <div class="modal-add-row">
      <input class="modal-input" id="new-label-name" placeholder="Nova etiqueta..." />
      <input type="color" class="color-pick" id="new-label-color" value="#3b82f6" />
      <button class="modal-save-btn" id="btn-create-label">+</button>
    </div>
    <button class="modal-close-btn" id="btn-close-modal">Fechar</button>
  </div>
</div>

<script>
const state = {
  ready: false, hasOpenAI: false,
  chats: [], labels: [],
  activeFilter: 'all', activeLabel: null, searchQuery: '',
  selectedChat: null, messages: [],
};

// ── Socket ──
const socket = io();
socket.on('qr', (dataUrl) => {
  document.getElementById('qr-spinner').style.display = 'none';
  const img = document.getElementById('qr-img');
  img.src = dataUrl; img.style.display = 'block';
  document.querySelector('#qr-screen p').textContent = 'WhatsApp → Dispositivos vinculados → Vincular dispositivo → Escaneie o QR';
});
socket.on('ready', () => {
  state.ready = true; setStatus(true);
  document.getElementById('qr-screen').style.display = 'none';
  showNoChatSelected();
  loadChats(); loadLabels();
});
socket.on('disconnected', () => { state.ready = false; setStatus(false); });
socket.on('chats_synced', () => loadChats());
socket.on('message', ({ chatId, message }) => {
  const chat = state.chats.find(c => c.id === chatId);
  if (chat) { chat.last_message = message.body; chat.last_message_time = message.timestamp; renderChatList(); }
  if (state.selectedChat?.id === chatId) { state.messages.push(message); renderMessages(); scrollToBottom(); }
});
socket.on('chat_updated', () => loadChats());

// ── Init ──
window.addEventListener('load', async () => {
  const me = await fetch('/api/me').then(r => r.ok ? r.json() : null);
  if (!me) { window.location.href = '/login.html'; return; }
  document.getElementById('user-info').textContent = me.name;

  const status = await fetch('/api/status').then(r => r.json());
  state.hasOpenAI = status.hasOpenAI;
  if (status.ready) {
    state.ready = true; setStatus(true);
    document.getElementById('qr-screen').style.display = 'none';
    showNoChatSelected();
    await loadChats(); await loadLabels();
  }
});

// ── API ──
async function loadChats() {
  const params = new URLSearchParams();
  if (state.searchQuery) params.set('search', state.searchQuery);
  if (state.activeFilter === 'group') params.set('type', 'group');
  else if (state.activeFilter === 'direct') params.set('type', 'direct');
  else if (state.activeFilter === 'unhandled') params.set('unhandled', '1');
  else if (state.activeFilter === 'archived') params.set('archived', '1');
  if (state.activeLabel) params.set('label', state.activeLabel);
  state.chats = await fetch('/api/chats?' + params).then(r => r.json());
  renderChatList();
}

async function loadLabels() {
  state.labels = await fetch('/api/labels').then(r => r.json());
  updateLabelFilters();
}

async function loadMessages(chatId) {
  const msgs = await fetch(`/api/chats/${encodeURIComponent(chatId)}/messages`).then(r => r.json());
  state.messages = Array.isArray(msgs) ? msgs : [];
  renderMessages(); scrollToBottom();
}

async function sendMessage() {
  if (!state.selectedChat || !state.ready) return;
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  await fetch(`/api/chats/${encodeURIComponent(state.selectedChat.id)}/send`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: text }),
  });
}

async function sendFile(file) {
  if (!state.selectedChat || !state.ready) return;
  const progress = document.getElementById('upload-progress');
  progress.style.display = 'block';
  progress.textContent = `Enviando ${file.name}...`;
  try {
    const formData = new FormData();
    formData.append('file', file);
    await fetch(`/api/chats/${encodeURIComponent(state.selectedChat.id)}/send-media`, { method: 'POST', body: formData });
    progress.textContent = 'Enviado!';
    setTimeout(() => { progress.style.display = 'none'; }, 2000);
  } catch (e) {
    progress.textContent = 'Erro ao enviar';
    setTimeout(() => { progress.style.display = 'none'; }, 3000);
  }
}

async function toggleUnhandled(chatId, value) {
  await fetch(`/api/chats/${encodeURIComponent(chatId)}/unhandled`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ unhandled: value }) });
  const chat = state.chats.find(c => c.id === chatId);
  if (chat) chat.unhandled = value;
  if (state.selectedChat?.id === chatId) state.selectedChat.unhandled = value;
  renderChatList(); updateActionBtns();
}

async function toggleArchive(chatId, value) {
  await fetch(`/api/chats/${encodeURIComponent(chatId)}/archive`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ archived: value }) });
  await loadChats();
  if (state.selectedChat?.id === chatId) showNoChatSelected();
}

async function addLabelToChat(chatId, labelId) {
  await fetch(`/api/chats/${encodeURIComponent(chatId)}/labels/${labelId}`, { method: 'POST' });
  await loadChats();
  const chat = state.chats.find(c => c.id === chatId);
  if (chat && state.selectedChat?.id === chatId) state.selectedChat = chat;
  renderActiveLabels();
}

async function removeLabelFromChat(chatId, labelId) {
  await fetch(`/api/chats/${encodeURIComponent(chatId)}/labels/${labelId}`, { method: 'DELETE' });
  await loadChats();
  const chat = state.chats.find(c => c.id === chatId);
  if (chat && state.selectedChat?.id === chatId) state.selectedChat = chat;
  renderActiveLabels();
}

async function createLabel(name, color) {
  const res = await fetch('/api/labels', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, color }) });
  if (res.ok) { await loadLabels(); renderManageModal(); }
}

async function deleteLabel(id) {
  await fetch('/api/labels/' + id, { method: 'DELETE' });
  await loadLabels(); await loadChats();
  if (state.activeLabel == id) state.activeLabel = null;
  renderManageModal(); renderActiveLabels();
}

// ── Render ──
function renderChatList() {
  const el = document.getElementById('chat-list');
  if (!state.chats.length) { el.innerHTML = '<div class="empty-msg">Nenhuma conversa</div>'; return; }
  el.innerHTML = state.chats.map(chat => `
    <div class="chat-item ${chat.unhandled ? 'unhandled' : ''} ${state.selectedChat?.id === chat.id ? 'active' : ''}"
         onclick="selectChat('${esc(chat.id)}')">
      <div class="chat-avatar">${chat.is_group ? '👥' : '👤'}</div>
      <div class="chat-info">
        <div class="chat-name">${esc(chat.name || chat.id)}</div>
        <div class="chat-preview">${esc(chat.last_message || '…')}</div>
        <div class="label-chips">${(chat.labels||[]).map(l => `<span class="label-chip" style="background:${l.color}">${esc(l.name)}</span>`).join('')}</div>
      </div>
      <div class="chat-meta">
        <span class="chat-time">${fmtTime(chat.last_message_time)}</span>
        ${chat.unhandled ? '<span class="badge-unhandled">pendente</span>' : ''}
        ${chat.archived ? '<span style="font-size:10px;color:var(--text2)">📁</span>' : ''}
      </div>
    </div>
  `).join('');
}

function renderMessages() {
  const el = document.getElementById('messages-container');
  if (!state.messages.length) { el.innerHTML = '<div class="empty-msg">Sem mensagens</div>'; return; }
  el.innerHTML = state.messages.map(m => {
    const isMe = m.from_me || m.fromMe;
    const mediaIcon = getMediaIcon(m.media_type);
    return `
      <div class="msg-row ${isMe ? 'from-me' : 'from-them'}">
        <div class="msg-bubble">
          ${!isMe && m.author ? `<div class="msg-author">${esc(m.author)}</div>` : ''}
          ${mediaIcon ? `<div class="msg-media-icon">${mediaIcon}</div>` : ''}
          ${m.body && !m.body.startsWith('[') ? `<div>${esc(m.body)}</div>` : (m.media_filename ? `<div style="font-size:12px;color:var(--text2)">📎 ${esc(m.media_filename)}</div>` : '')}
          ${m.transcription ? `<div class="msg-transcription">🗣 ${esc(m.transcription)}</div>` : ''}
          ${m.summary ? `<div class="msg-summary">💡 ${esc(m.summary)}</div>` : ''}
          ${m.media_type && !m.transcription && m.media_type.startsWith('audio') && state.hasOpenAI ?
            `<button onclick="transcribeMsg('${esc(m.id)}')" style="margin-top:4px;padding:2px 8px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:6px;font-size:11px;cursor:pointer">Transcrever</button>` : ''}
          <div class="msg-time">${fmtTime(m.timestamp)}</div>
        </div>
      </div>
    `;
  }).join('');
}

function getMediaIcon(mediaType) {
  if (!mediaType) return null;
  if (mediaType.startsWith('audio')) return '🔊';
  if (mediaType.startsWith('image')) return '🖼';
  if (mediaType.startsWith('video')) return '🎬';
  return '📎';
}

async function transcribeMsg(msgId) {
  const res = await fetch(`/api/messages/${encodeURIComponent(msgId)}/transcribe`, { method: 'POST' });
  if (res.ok) {
    const data = await res.json();
    const msg = state.messages.find(m => m.id === msgId);
    if (msg) { msg.transcription = data.transcription; msg.summary = data.summary; renderMessages(); }
  }
}

function renderActiveLabels() {
  const chat = state.selectedChat;
  const el = document.getElementById('active-labels');
  if (!chat) { el.innerHTML = ''; return; }
  el.innerHTML = (chat.labels || []).map(l => `
    <span class="label-tag" style="background:${l.color}">
      ${esc(l.name)}
      <span class="remove-label" onclick="removeLabelFromChat('${esc(chat.id)}',${l.id})">×</span>
    </span>
  `).join('');
}

function updateActionBtns() {
  const chat = state.selectedChat;
  if (!chat) return;
  const unhandledBtn = document.getElementById('btn-unhandled');
  if (chat.unhandled) {
    unhandledBtn.textContent = '✓ Tratado';
    unhandledBtn.style.borderColor = 'var(--accent)'; unhandledBtn.style.color = 'var(--accent)';
    unhandledBtn.classList.remove('warn-btn');
  } else {
    unhandledBtn.innerHTML = '⚑ Pendente';
    unhandledBtn.style.borderColor = ''; unhandledBtn.style.color = '';
    unhandledBtn.classList.add('warn-btn');
  }
  const archiveBtn = document.getElementById('btn-archive');
  archiveBtn.textContent = chat.archived ? '📂 Desarquivar' : '📁 Arquivar';
}

function renderManageModal() {
  const el = document.getElementById('modal-label-list');
  el.innerHTML = state.labels.map(l => `
    <div class="modal-label-row">
      <div class="modal-label-color" style="background:${l.color}"></div>
      <div class="modal-label-name">${esc(l.name)}</div>
      <button class="modal-del-btn" onclick="deleteLabel(${l.id})">Excluir</button>
    </div>
  `).join('') || '<div style="color:var(--text2);font-size:13px;padding:8px 0">Nenhuma etiqueta</div>';
}

function updateLabelFilters() {
  const bar = document.getElementById('filter-bar');
  bar.querySelectorAll('[data-label]').forEach(b => b.remove());
  state.labels.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (state.activeLabel == l.id ? ' active' : '');
    btn.dataset.label = l.id;
    btn.textContent = l.name;
    btn.style.borderColor = l.color;
    btn.addEventListener('click', () => {
      if (state.activeLabel == l.id) { state.activeLabel = null; btn.classList.remove('active'); }
      else { state.activeLabel = l.id; document.querySelectorAll('[data-label]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
      loadChats();
    });
    bar.appendChild(btn);
  });
}

// ── Chat Selection ──
async function selectChat(chatId) {
  const chat = state.chats.find(c => c.id === chatId);
  if (!chat) return;
  state.selectedChat = chat;
  state.messages = [];
  document.getElementById('qr-screen').style.display = 'none';
  document.getElementById('no-chat-selected').style.display = 'none';
  const chatView = document.getElementById('chat-view');
  chatView.style.display = 'flex';
  document.getElementById('chat-header-avatar').textContent = chat.is_group ? '👥' : '👤';
  document.getElementById('chat-header-name').textContent = chat.name || chatId;
  document.getElementById('chat-header-sub').textContent = chat.is_group ? 'Grupo' : 'Conversa direta';
  updateActionBtns(); renderActiveLabels(); renderChatList();
  document.getElementById('messages-container').innerHTML = '<div class="empty-msg">Carregando...</div>';
  await loadMessages(chatId);
}

function showNoChatSelected() {
  document.getElementById('qr-screen').style.display = 'none';
  document.getElementById('no-chat-selected').style.display = 'flex';
  document.getElementById('chat-view').style.display = 'none';
}

// ── Events ──
document.getElementById('btn-logout').addEventListener('click', async () => {
  await fetch('/api/logout', { method: 'POST' });
  window.location.href = '/login.html';
});

document.getElementById('search-input').addEventListener('input', (e) => {
  state.searchQuery = e.target.value; loadChats();
});

document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.activeFilter = btn.dataset.filter;
    state.activeLabel = null;
    document.querySelectorAll('[data-label]').forEach(b => b.classList.remove('active'));
    loadChats();
  });
});

document.getElementById('btn-unhandled').addEventListener('click', () => {
  if (!state.selectedChat) return;
  toggleUnhandled(state.selectedChat.id, !state.selectedChat.unhandled);
});

document.getElementById('btn-archive').addEventListener('click', () => {
  if (!state.selectedChat) return;
  toggleArchive(state.selectedChat.id, !state.selectedChat.archived);
});

// Enviar mensagem
document.getElementById('btn-send').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Anexar arquivo
document.getElementById('btn-attach').addEventListener('click', () => document.getElementById('file-input').click());
document.getElementById('file-input').addEventListener('change', (e) => {
  if (e.target.files[0]) { sendFile(e.target.files[0]); e.target.value = ''; }
});

// Gravar áudio
let mediaRecorder = null, audioChunks = [];
document.getElementById('btn-audio').addEventListener('click', async () => {
  const btn = document.getElementById('btn-audio');
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    btn.classList.remove('recording');
    btn.title = 'Gravar áudio';
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const file = new File([blob], 'audio.webm', { type: 'audio/webm' });
        sendFile(file);
        stream.getTracks().forEach(t => t.stop());
      };
      mediaRecorder.start();
      btn.classList.add('recording');
      btn.title = 'Parar gravação';
    } catch (e) { alert('Microfone não disponível'); }
  }
});

// Labels
document.getElementById('btn-add-label').addEventListener('click', (e) => showLabelDropdown(e.currentTarget));
document.getElementById('btn-labels-panel').addEventListener('click', (e) => showLabelDropdown(e.currentTarget));

function showLabelDropdown(anchor) {
  if (!state.selectedChat) return;
  const dropdown = document.getElementById('label-dropdown');
  const activeLabelIds = (state.selectedChat.labels || []).map(l => l.id);
  const available = state.labels.filter(l => !activeLabelIds.includes(l.id));
  dropdown.innerHTML = available.length
    ? available.map(l => `<div class="dropdown-item" onclick="addLabelToChat('${esc(state.selectedChat.id)}',${l.id});closeDropdown()"><span class="dropdown-dot" style="background:${l.color}"></span>${esc(l.name)}</div>`).join('')
    : '<div class="dropdown-item" style="color:var(--text2)">Nenhuma disponível</div>';
  const rect = anchor.getBoundingClientRect();
  dropdown.style.top = (rect.bottom + 4) + 'px';
  dropdown.style.left = rect.left + 'px';
  dropdown.style.display = 'block';
}

function closeDropdown() { document.getElementById('label-dropdown').style.display = 'none'; }
document.addEventListener('click', (e) => {
  if (!e.target.closest('#label-dropdown') && !e.target.closest('#btn-add-label') && !e.target.closest('#btn-labels-panel')) closeDropdown();
});

document.getElementById('btn-manage-labels').addEventListener('click', () => { renderManageModal(); document.getElementById('modal-manage').style.display = 'flex'; });
document.getElementById('btn-close-modal').addEventListener('click', () => { document.getElementById('modal-manage').style.display = 'none'; });
document.getElementById('modal-manage').addEventListener('click', (e) => { if (e.target === document.getElementById('modal-manage')) document.getElementById('modal-manage').style.display = 'none'; });
document.getElementById('btn-create-label').addEventListener('click', async () => {
  const name = document.getElementById('new-label-name').value.trim();
  const color = document.getElementById('new-label-color').value;
  if (!name) return;
  await createLabel(name, color);
  document.getElementById('new-label-name').value = '';
});

// ── Utils ──
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts * 1000), now = new Date();
  if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}
function scrollToBottom() { const el = document.getElementById('messages-container'); el.scrollTop = el.scrollHeight; }
function setStatus(connected) {
  document.getElementById('status-dot').className = 'status-dot' + (connected ? ' connected' : '');
  document.getElementById('status-text').textContent = connected ? 'Conectado' : 'Desconectado';
}
</script>
</body>
</html>
